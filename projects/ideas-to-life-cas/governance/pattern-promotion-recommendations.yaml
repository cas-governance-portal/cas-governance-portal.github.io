- pattern_id: pattern-cas-authoritative-architecture-backlog
  recommendation: promote
  promotion_readiness: high
  promotion_rationale: Establishes the fundamental source of truth for architectural
    planning. Critical governance mechanism that prevents data loss during automated
    artifact generation cycles across any project.
  promotion_evidence:
  - Regenerated Artifacts Should Not Own Planning State
  - Governance Artifacts Prefer Derived State
