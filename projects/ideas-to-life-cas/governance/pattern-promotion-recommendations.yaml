- pattern_id: pattern-cas-structured-decision-governance
  recommendation: promote
  promotion_readiness: high
  promotion_rationale: Transitioning to structured schemas (YAML/JSON) is a prerequisite
    for automated architectural reasoning and evolution tracking, making it a foundational
