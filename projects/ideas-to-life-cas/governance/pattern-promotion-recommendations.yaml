deferred_candidates:
- pattern_id: pattern-cas-continuous-governance-loop
  recommendation: defer
  rationale: Foundational for intelligence-driven governance but currently classified
    as emerging maturity. Supports core execution and governance patterns rather than
    defining the base structure. Requires further validation.
  evidence_gaps: Cross-project validation metrics, long-term stability data, and automated
    remediation success rates.
  promotion_criteria_missing:
  - governance_maturity
  - recurrence
  recommended_next_step: Monitor adoption in pilot projects, collect metrics on governance
    velocity improvement, and validate automated remediation safety.
  scope_alignment: global
  confidence: medium
- pattern_id: pattern-cas-architecture-knowledge-graph
  recommendation: defer
  rationale: Strategic direction with medium evidence. Highly valuable for cross-project
    intelligence but requires further validation in a multi-project environment before
    global promotion.
  evidence_gaps: Multi-project implementation data, performance benchmarks, and integration
    signals from other projects.
  promotion_criteria_missing:
  - reusability
  - recurrence
  - evidence_quality
  recommended_next_step: Implement in secondary project, gather cross-project dependency
    metrics, and validate lineage analysis capabilities.
  scope_alignment: project
  confidence: medium
- pattern_id: pattern-cas-business-intent-traceability
  recommendation: defer
  rationale: Strategic direction with medium evidence. Integration of business intent
    as a formal constraint is a high-level goal that needs more concrete implementation
    signals to reach global stability.
  evidence_gaps: Concrete implementation signals, business value quantification, and
    integration with existing governance loops.
  promotion_criteria_missing:
  - reusability
  - recurrence
  - evidence_quality
  recommended_next_step: Pilot integration with business requirement tracking, measure
    strategic drift reduction, and validate constraint enforcement mechanisms.
  scope_alignment: project
  confidence: medium
rejected_candidates: []
duplicate_overlapping_promotion_candidates:
- patterns_involved:
  - pattern-cas-authoritative-architecture-backlog
  - pattern-cas-structured-decision-governance
  recommended_action: keep_separate
  rationale: While both address governance artifacts, the Backlog pattern focuses
    on the 'source of truth' and planning lifecycle, whereas the Structured Decision
    pattern focuses on the 'data contract' and machine-readability of individual records.
