promotion_candidates:
- pattern_id: pattern-cas-decoupled-execution-model
  recommendation: promote
  promotion_readiness: high
  promotion_rationale: This pattern defines the foundational execution model for the
    CAS framework. It is implementation-agnostic and essential for any system adopting
    the CAS workflow model, showing high maturity and strong evidence from multiple
    architecture work items.
  promotion_evidence:
  - recurring_architecture_work
  - current_architecture_state_support
  - cross_project_applicability
  promotion_criteria_met:
  - significance
  - reusability
  - recurrence
  - evidence_quality
  - strategic_alignment
  scope_alignment: global
  evidence_strength: high
  governance_risks: []
  confidence: high
- pattern_id: pattern-cas-authoritative-architecture-backlog
  recommendation: promote
  promotion_readiness: high
  promotion_rationale: Establishes the fundamental source of truth for architectural
    planning. This is a critical governance mechanism that prevents data loss during
    automated artifact generation cycles and is already being operationalized in the
    current state.
  promotion_evidence:
  - recurring_signals
  - governance_model_alignment
  - current_architecture_state_support
  promotion_criteria_met:
  - significance
  - reusability
  - governance_maturity
  - strategic_alignment
  scope_alignment: global
  evidence_strength: high
  governance_risks: []
  confidence: high
- pattern_id: pattern-cas-structured-decision-governance
  recommendation: promote
  promotion_readiness: high
  promotion_rationale: Directly addresses a critical gap identified in the current
    architecture state regarding machine-processable governance. Transitioning to
    structured schemas is a prerequisite for automated architectural reasoning.
  promotion_evidence:
  - recurring_signals
  - governance_model_alignment
  - strategic_direction_alignment
  promotion_criteria_met:
  - significance
  - reusability
  - evidence_quality
  - strategic_alignment
  scope_alignment: global
  evidence_strength: high
  governance_risks:
  - migration_overhead_for_legacy_narrative_adrs
  confidence: high
deferred_candidates:
- pattern_id: pattern-cas-continuous-governance-loop
  recommendation: defer
  rationale: While foundational for intelligence-driven governance, its 'emerging'
    status suggests it supports core patterns rather than defining the base structure.
    It requires further operational validation.
  evidence_gaps: Requires more concrete implementation signals from the 'Continuous
    Architecture Governance' initiative to move from emerging to established maturity.
  promotion_criteria_missing:
  - governance_maturity
  recommended_next_step: Monitor the 'Continuous Architecture Governance' initiative
    for successful automated remediation signals.
  scope_alignment: global
  confidence: high
- pattern_id: pattern-cas-architecture-knowledge-graph
  recommendation: defer
  rationale: Currently categorized as strategic direction with project-level scope.
    Requires validation in a multi-project environment before global promotion.
  evidence_gaps: Lack of cross-project relationship modeling evidence in the current
    architecture state.
  promotion_criteria_missing:
  - reusability
  - recurrence
  recommended_next_step: Validate the graph model against a second project to confirm
    cross-project lineage requirements.
  scope_alignment: project
  confidence: medium
- pattern_id: pattern-cas-business-intent-traceability
  recommendation: defer
  rationale: Integration of business intent as a formal constraint is a high-level
    goal that needs more concrete implementation signals to reach global stability.
  evidence_gaps: Insufficient evidence of 'Strategic Drift' detection being successfully
    executed in the current operational state.
  promotion_criteria_missing:
  - evidence_quality
  - governance_maturity
  recommended_next_step: Develop a pilot implementation connecting a specific business
    requirement to a code-level guardrail.
  scope_alignment: project
  confidence: medium
rejected_candidates: []
duplicate_overlapping_promotion_candidates:
- patterns_involved:
  - pattern-cas-authoritative-architecture-backlog
  - pattern-cas-structured-decision-governance
  recommended_action: keep_separate
  rationale: The Backlog pattern focuses on the 'source of truth' and planning lifecycle,
    whereas the Structured Decision pattern focuses on the 'data contract' and machine-readability
    of individual records.
promotion_preconditions_not_met:
- pattern_id: pattern-cas-continuous-governance-loop
  unmet_preconditions:
  - governance_maturity
  missing_evidence:
  - operational_stability_metrics
  rationale: The pattern is currently classified as 'emerging' and is part of a proposed
    initiative rather than an active capability.
  recommended_next_step: Re-evaluate after the 'Continuous Architecture Governance'
    initiative reaches 'Active' status.
- pattern_id: pattern-cas-architecture-knowledge-graph
  unmet_preconditions:
  - scope_classification_is_global
  missing_evidence:
  - cross_project_applicability_signals
  rationale: The pattern is currently scoped to the project level and requires multi-project
    validation.
  recommended_next_step: Promote to global scope only after multi-project validation
    is completed.
governance_summary:
  immediate_promotion_candidates:
  - pattern-cas-decoupled-execution-model
  - pattern-cas-authoritative-architecture-backlog
  - pattern-cas-structured-decision-governance
  deferred_candidates:
  - pattern-cas-continuous-governance-loop
  - pattern-cas-architecture-knowledge-graph
  - pattern-cas-business-intent-traceability
  rejected_candidates: []
  major_governance_risks:
  - Governance velocity bottleneck (30:2 ratio) may delay the formal adoption and
    institutionalization of promoted patterns.
  - Technical debt from legacy narrative ADRs may conflict with the 'Structured Decision
    Governance' pattern during migration.
