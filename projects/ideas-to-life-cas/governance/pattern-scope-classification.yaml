global_pattern_candidates:
- id: pattern-cas-decoupled-execution-model
  scope: global
  classification: core
  evidence_summary: Established maturity with high evidence strength from multiple
    architecture work items (aw-ideas-to-life-cas-20260605-04, aw-ideas-to-life-cas-20260605-03)
    and alignment with the current architecture state.
  rationale: This pattern defines the foundational execution model for the CAS framework,
    separating reasoning from orchestration. It is implementation-agnostic and essential
    for any system adopting the CAS workflow model.
  promotion_readiness: high
- id: pattern-cas-authoritative-architecture-backlog
  scope: global
  classification: core
  evidence_summary: High confidence and established maturity. Derived from signals
    regarding artifact regeneration and governance state management.
  rationale: Establishes the fundamental source of truth for architectural planning.
    This is a critical governance mechanism that prevents data loss during automated
    artifact generation cycles across any project.
  promotion_readiness: high
- id: pattern-cas-structured-decision-governance
  scope: global
  classification: core
  evidence_summary: High evidence strength. Directly addresses a critical gap identified
    in the current architecture state regarding machine-processable governance.
  rationale: Transitioning to structured schemas (YAML/JSON) is a prerequisite for
    automated architectural reasoning and evolution tracking, making it a foundational
    global standard.
  promotion_readiness: high
- id: pattern-cas-continuous-governance-loop
  scope: global
  classification: supporting
  evidence_summary: High evidence strength but currently classified as emerging maturity.
    Supported by multiple signals regarding governance velocity and automated remediation.
  rationale: While foundational for intelligence-driven governance, its 'emerging'
    status suggests it supports the core execution and governance patterns rather
    than defining the base structure.
  promotion_readiness: medium
project_pattern_candidates:
- id: pattern-cas-architecture-knowledge-graph
  scope: project
  rationale: Currently categorized as strategic direction with medium evidence. While
    highly valuable for cross-project intelligence, it requires further validation
    in a multi-project environment before global promotion.
  future_promotion_potential: high
- id: pattern-cas-business-intent-traceability
  scope: project
  rationale: Strategic direction with medium evidence. The integration of business
    intent as a formal constraint is a high-level goal that needs more concrete implementation
    signals to reach global stability.
  future_promotion_potential: high
candidate_patterns_requiring_review: []
duplicate_overlapping_patterns:
- patterns:
  - pattern-cas-authoritative-architecture-backlog
  - pattern-cas-structured-decision-governance
  recommended_action: keep_separate
  rationale: While both address governance artifacts, the Backlog pattern focuses
    on the 'source of truth' and planning lifecycle, whereas the Structured Decision
    pattern focuses on the 'data contract' and machine-readability of individual records.
promotion_recommendations:
  immediate_candidates:
  - pattern-cas-decoupled-execution-model
  - pattern-cas-authoritative-architecture-backlog
  - pattern-cas-structured-decision-governance
  deferred_candidates:
  - pattern-cas-continuous-governance-loop
  additional_evidence_required:
  - pattern-cas-architecture-knowledge-graph
  - pattern-cas-business-intent-traceability
