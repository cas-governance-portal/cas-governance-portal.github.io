- pattern_id: pattern-decoupled-execution-model
  name: Decoupled Reasoning and Orchestration
  pattern_classification: execution
  pattern_maturity: established
  knowledgeType: signal
  decision:
    status: proposed
    decided_by: system
    date: null
  derived_from:
    signals:
    - Workflow Execution Model Compliance
    - Knowledge Access Abstraction
    architecture_work:
    - aw-ideas-to-life-cas-20260605-04
    - aw-ideas-to-life-cas-20260605-03
    supporting_evidence:
    - current_architecture_state
    - architecture_evolution_map
  description: A standardized execution model that strictly separates the Runner (orchestration),
    the Workflow (reasoning), and the Knowledge Provider (storage abstraction).
  pattern_type: implemented
  applies_to:
  - execution
  - automation
  - contracts
  rationale:
  - Ensures workflows remain implementation-agnostic regarding storage and environment.
  - Provides a consistent contract for reasoning agents to interact with architectural
    knowledge.
  evidence_strength: high
  confidence: high
- pattern_id: pattern-authoritative-architecture-backlog
  name: Architecture Work Registry as Authoritative Source
  pattern_classification: governance
  pattern_maturity: emerging
  knowledgeType: signal
  decision:
    status: proposed
    decided_by: system
    date: null
  derived_from:
    signals:
    - Regenerated Artifacts Should Not Own Planning State
    - Governance Artifacts Prefer Derived State
    architecture_work:
    - aw-ideas-to-life-cas-2026-05-31-001
    supporting_evidence:
    - current_architecture_state
    - alignment_findings
  description: The institutionalization of Architecture Work artifacts as the single
    source of truth for architectural change, where dashboards like AEM are derived
    rather than authored.
  pattern_type: emerging
  applies_to:
  - governance
  - automation
  rationale:
  - Prevents the loss of planning information during the regeneration of high-level
    governance views.
  - Enables a persistent audit trail of architectural intent across the project lifecycle.
  evidence_strength: high
  confidence: high
- pattern_id: pattern-continuous-governance-loop
  name: Automated Detect-Analyse-Execute Loop
  pattern_classification: governance
  pattern_maturity: strategic_direction
  knowledgeType: signal
  decision:
