- pattern_id: pattern-cas-decoupled-execution-model
  name: Decoupled Reasoning and Orchestration
  pattern_classification: execution
  pattern_maturity: established
  knowledgeType: signal
  decision:
    status: proposed
    decided_by: system
    date: null
  derived_from:
    signals:
    - Workflow Execution Model Compliance
    - Knowledge Access Abstraction
    architecture_work:
    - aw-ideas-to-life-cas-20260605-04
    - aw-ideas-to-life-cas-20260605-03
    supporting_evidence:
    - current_architecture_state
    - aem-ideas-to-life-cas-2026-06-06
  description: Separation of the orchestration layer (Runner) from the reasoning logic
    (Workflows) and the data access layer (Knowledge Providers) using prompt-based
    contracts.
  pattern_type: implemented
  applies_to:
  - execution
  - automation
  - contracts
  rationale:
  - Ensures workflows remain implementation-agnostic regarding storage and execution
    environments.
  - Enables modular evolution of reasoning capabilities without modifying the core
    orchestration engine.
  evidence_strength: high
  confidence: high
- pattern_id: pattern-cas-authoritative-architecture-backlog
  name: Authoritative Architecture Work Registry
  pattern_classification: governance
  pattern_maturity: established
  knowledgeType: signal
  decision:
    status: proposed
    decided_by: system
    date: null
  derived_from:
    signals:
    - Regenerated Artifacts Should Not Own Planning State
    - Governance Artifacts Prefer Derived State
    architecture_work:
    - aw-ideas-to-life-cas-2026-05-31-001
    supporting_evidence:
    - current_architecture_state
    - aem-ideas-to-life-cas-2026-06-06
  description: Establishing Architecture Work artifacts as the primary source of truth
    for architectural planning and change, where downstream artifacts like AEMs are
    generated summaries.
  pattern_type: implemented
  applies_to:
  - governance
  - automation
  rationale:
  - Prevents loss of planning data during artifact regeneration cycles.
  - Provides a persistent audit trail of architectural intent and progression.
  evidence_strength: high
  confidence: high
