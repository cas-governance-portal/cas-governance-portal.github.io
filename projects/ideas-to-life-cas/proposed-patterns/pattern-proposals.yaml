- pattern_id: pattern-cas-structured-decision-governance
  name: Machine-Processable Decision Schemas
  pattern_classification: governance
  pattern_maturity: emerging
  knowledgeType: signal
  decision:
    status: proposed
    decided_by: system
    date: null
  derived_from:
    signals:
    - Violation of Structured Decision Schema
    - Decision Schema Must Be Structured
    architecture_work:
    - aw-ideas-to-life-cas-2026-05-31-003
    supporting_evidence:
    - alignment_findings
    - aem-ideas-to-life-cas-2026-06-06
  description: Transitioning from narrative-based documentation to structured YAML/JSON
    schemas for all architectural decisions to enable automated evolution tracking.
  pattern_type: emerging
  applies_to:
