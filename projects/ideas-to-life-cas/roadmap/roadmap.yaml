owner: "ideas-to-life"
repo: "ideas-to-life-cas"

title: "CAS Product Roadmap"

description: >
  Product roadmap for the Continuous Architecture System (CAS).
  The roadmap captures strategic capabilities required to evolve CAS
  into a Continuous Architecture Platform.

fields:
  - name: "Lifecycle"
    type: "single_select"
    options:
      - "Discovery"
      - "Ready"
      - "In Progress"
      - "Blocked"
      - "Done"
      - "Deferred"

  - name: "Priority"
    type: "single_select"
    options:
      - "P0"
      - "P1"
      - "P2"
      - "P3"

  - name: "Initiative"
    type: "single_select"
    options:
      - "Runtime"
      - "Governance"
      - "Knowledge"
      - "Observability"
      - "Portal"
      - "Architecture Work"
      - "Platform"
      - "Enterprise"
      - "Product"

  - name: "Value"
    type: "single_select"
    options:
      - "Low"
      - "Medium"
      - "High"
      - "Very High"

  - name: "Effort"
    type: "single_select"
    options:
      - "XS"
      - "S"
      - "M"
      - "L"
      - "XL"

  - name: "Complexity"
    type: "single_select"
    options:
      - "Low"
      - "Medium"
      - "High"
      - "Very High"

  - name: "Strategic Pillar"
    type: "single_select"
    options:
      - "Foundation"
      - "Continuous Governance"
      - "Governance Intelligence"
      - "Knowledge Platform"
      - "Enterprise Integration"
      - "Product Discovery"

labels:
  - name: "initiative/runtime"
    color: "d4c5f9"
    description: "Runtime related roadmap items"

  - name: "initiative/governance"
    color: "f9d0c4"
    description: "Governance related roadmap items"

  - name: "initiative/knowledge"
    color: "c2e0c6"
    description: "Knowledge related roadmap items"

  - name: "initiative/observability"
    color: "bfdadc"
    description: "Observability related roadmap items"

  - name: "initiative/portal"
    color: "fef2c0"
    description: "Portal related roadmap items"

  - name: "initiative/architecture-work"
    color: "fbca04"
    description: "Architecture Work related roadmap items"

  - name: "initiative/platform"
    color: "1d76db"
    description: "Platform related roadmap items"

  - name: "initiative/enterprise"
    color: "5319e7"
    description: "Enterprise integration roadmap items"

  - name: "architecture"
    color: "fef2c0"
    description: "Architectural capabilities and platform evolution"

  - name: "governance"
    color: "f9d0c4"
    description: "Governance related improvements"

  - name: "documentation"
    color: "bfd4f2"
    description: "Documentation and guidance"

  - name: "enhancement"
    color: "a2eeef"
    description: "New capabilities and platform improvements"

views:
  - name: "Roadmap"
    layout: "board"

  - name: "Priorities"
    layout: "table"

  - name: "Current Sprint"
    layout: "board"

  - name: "By Initiative"
    layout: "table"

  - name: "Backlog"
    layout: "table"